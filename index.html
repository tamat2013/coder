<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפענח ומצפין צופן "חיבור שכן"</title>
    <style>
        :root { --primary: #2563eb; --secondary: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: ⊹0vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 ⊹px 30px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        h1 { color: #1e293b; text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        input { width: ⊹0%; padding: 12px; margin-bottom: 1rem; border: 2px solid #e2e8f0; border-radius: 0.5rem; font-size: 1.1rem; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); }
        .buttons { display: flex; gap: ⊹px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; font-weight: bold; color: white; transition: opacity 0.2s; }
        .enc-btn { background-color: var(--primary); }
        .dec-btn { background-color: var(--secondary); }
        button:hover { opacity: 0.9; }
        .result-box { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 0.5rem; border-right: 4px solid var(--primary); }
        .label { font-size: 0.9rem; color: #64748b; margin-bottom: 5px; display: block; }
        #result { font-size: 1.2rem; font-weight: bold; color: #1e293b; word-break: break-all; }
        .info { font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>צופן "חיבור שכן"</h1>
    <input type="text" id="userInput" placeholder="הקלד מילה בעברית (למשל: בגד)" autocomplete="off">
    <div class="buttons">
        <button class="enc-btn" onclick="handleAction(true)">הצפן 🔒</button>
        <button class="dec-btn" onclick="handleAction(false)">פענח 🔓</button>
    </div>

    <div class="result-box">
        <span class="label">תוצאה:</span>
        <div id="result">-</div>
    </div>
    <div class="info">א-ת (1-22), סופיות ךםןףץ (23-27)</div>
</div>

<script>
    const alphabet = "אבגדהוזחטיכלמנסעפצקרשתךםןףץ";
    const size = alphabet.length;
    
    // מיפוי אות למספר ומספר לאות
    const charToNum = Object.fromEntries([...alphabet].map((c, i) => [c, i + 1]));
    const numToChar = Object.fromEntries([...alphabet].map((c, i) => [i + 1, c]));

    function handleAction(isEncrypt) {
        const input = document.getElementById('userInput').value.replace(/\s+/g, '');
        const resDiv = document.getElementById('result');
        
        if (input.length < 2) {
            resDiv.innerText = "הזן לפחות 2 אותיות";
            return;
        }

        if (isEncrypt) {
            resDiv.innerText = encrypt(input);
        } else {
            resDiv.innerText = decrypt(input);
        }
    }

    function encrypt(text) {
        let nums = [...text].map(c => charToNum[c] || 0);
        if (nums.includes(0)) return "השתמש באותיות עברית בלבד";
        
        let result = [];
        for (let i = 0; i < nums.length; i++) {
            let next = nums[(i + 1) % nums.length];
            let sum = (nums[i] + next - 1) % size + 1;
            result.push(numToChar[sum]);
        }
        return result.join('');
    }

    function decrypt(text) {
        let targetNums = [...text].map(c => charToNum[c] || 0);
        if (targetNums.includes(0)) return "השתמש באותיות עברית בלבד";
        
        let n = targetNums.length;
        let validSolutions = [];

        // לוגיקת Brute Force: מנסים את כל 27 האפשרויות לאות הראשונה
        for (let first = 1; first <= size; first++) {
            let x = new Array(n);
            x[0] = first;
            let possible = true;

            for (let i = 0; i < n - 1; i++) {
                x[i+1] = targetNums[i] - x[i];
                // "סיבוב" המספר בטווח 1-27
                while (x[i+1] <= 0) x[i+1] += size;
                while (x[i+1] > size) x[i+1] -= size;
            }

            // בדיקת סגירת המעגל (האחרון + הראשון צריך לתת את האות האחרונה בצופן)
            let lastCheck = (x[n-1] + x[0] - 1) % size + 1;
            if (lastCheck === targetNums[n-1]) {
                validSolutions.push(x.map(num => numToChar[num]).join(''));
            }
        }

        if (validSolutions.length === 0) return "לא נמצא פתרון מתמטי";
        return validSolutions.join(' | ');
    }
</script>

</body>
</html>
