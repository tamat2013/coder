<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופן חיבור שכן - רווח=0</title>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 600px; }
        h1 { color: #1e293b; text-align: center; margin-bottom: 1rem; font-size: 1.5rem; }
        textarea { width: 100%; padding: 12px; margin-bottom: 1rem; border: 2px solid #e2e8f0; border-radius: 0.5rem; font-size: 1.1rem; box-sizing: border-box; outline: none; min-height: 100px; font-family: inherit; }
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; font-weight: bold; color: white; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .enc-btn { background-color: var(--primary); }
        .dec-btn { background-color: var(--secondary); }
        .result-box { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 0.5rem; border-right: 4px solid var(--primary); }
        .label { font-size: 0.8rem; color: #64748b; font-weight: bold; margin-bottom: 8px; display: block; }
        #result { font-size: 1.2rem; color: #1e293b; white-space: pre-wrap; word-break: break-all; line-height: 1.4; }
        .info { font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>צופן "חיבור שכן"</h1>
    <textarea id="userInput" placeholder="הקלד טקסט (רווח נחשב כ-0)..."></textarea>
    <div class="buttons">
        <button class="enc-btn" onclick="process(true)">הצפן 🔒</button>
        <button class="dec-btn" onclick="process(false)">פענח 🔓</button>
    </div>

    <div class="result-box">
        <span class="label">תוצאה:</span>
        <div id="result">-</div>
    </div>
    <div class="info">רווח = 0 | א=1 ... ת=22 | סופיות=23-27</div>
</div>

<script>
    const alphabet = " אבגדהוזחטיכלמנסעפצקרשתךםןףץ"; // רווח באינדקס 0
    const size = alphabet.length; // 28 תווים (0 עד 27)

    function process(isEncrypt) {
        const input = document.getElementById('userInput').value;
        const resDiv = document.getElementById('result');
        if (input.length < 2) { resDiv.innerText = "הזן לפחות 2 תווים"; return; }

        // המרה למספרים (רווח הופך ל-0)
        let nums = [...input].map(c => {
            let idx = alphabet.indexOf(c);
            return idx === -1 ? 0 : idx;
        });

        if (isEncrypt) {
            let encrypted = [];
            for (let i = 0; i < nums.length; i++) {
                let next = nums[(i + 1) % nums.length];
                let sum = (nums[i] + next) % size;
                encrypted.push(alphabet[sum]);
            }
            resDiv.innerText = encrypted.join('');
        } else {
            let solutions = [];
            // Brute force על האות הראשונה (כולל רווח כאופציה)
            for (let first = 0; first < size; first++) {
                let x = new Array(nums.length);
                x[0] = first;
                for (let i = 0; i < nums.length - 1; i++) {
                    x[i+1] = (nums[i] - x[i]);
                    while (x[i+1] < 0) x[i+1] += size;
                    x[i+1] %= size;
                }
                if ((x[nums.length - 1] + x[0]) % size === nums[nums.length - 1]) {
                    solutions.push(x.map(n => alphabet[n]).join(''));
                }
            }
            resDiv.innerText = solutions.length > 0 ? solutions.join(' | ') : "אין פתרון מתמטי";
        }
    }
</script>

</body>
</html>
