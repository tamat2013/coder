<!doctype html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>צופן סכום זוגות מחזורי</title>
  <style>
    body { font-family: Arial, sans-serif; direction: rtl; text-align: right; }
    textarea { width: 100%; margin: 5px 0; }
    button { margin: 5px 5px 5px 0; }
    pre { background: #f0f0f0; padding: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>הצפנה</h2>
  <textarea id="plain" rows="2" placeholder="טקסט מקור"></textarea><br>
  <button onclick="encrypt()">הצפן</button>
  <button onclick="clearFields()">ניקוי שדות</button><br>
  <textarea id="cipher" rows="2" placeholder="טקסט מוצפן"></textarea>
  <button onclick="copyCipher()">העתק טקסט מוצפן</button>

  <h2>פענוח (אפשרויות)</h2>
  <textarea id="cipherIn" rows="2" placeholder="טקסט מוצפן"></textarea><br>
  <button onclick="decrypt()">פענח</button><br>
  <pre id="decryptOut"></pre>

  <script>
    const letters = "אבגדהוזחטיכלמנסעפצקרשת";
    function toNum(c) { return letters.indexOf(c) + 1; }
    function toLet(n) { return letters[(n-1) % letters.length]; }

    // הצפנה
    function encrypt() {
      let txt = document.getElementById("plain").value.trim();
      let nums = txt.split("").map(toNum);
      let out = [];
      for (let i=0; i<nums.length; i++) {
        let a = nums[i];
        let b = nums[(i+1)%nums.length];
        out.push(toLet((a+b-1)%22+1));
      }
      document.getElementById("cipher").value = out.join("");
    }

    // פענוח
    function decrypt() {
      let txt = document.getElementById("cipherIn").value.trim();
      let nums = txt.split("").map(toNum);
      let result = "";
      for (let i=0; i<nums.length; i++) {
        let target = nums[i];
        let options = new Set();
        for (let a=1; a<=22; a++) {
          for (let b=1; b<=22; b++) {
            if (((a+b-1)%22)+1 === target) {
              options.add(toLet(a));
              options.add(toLet(b));
            }
          }
        }
        result += "אות " + (i+1) + ": " + Array.from(options).join(", ") + "\n";
      }
      document.getElementById("decryptOut").textContent = result;
    }

    // ניקוי שדות
    function clearFields() {
      document.getElementById("plain").value = "";
      document.getElementById("cipher").value = "";
      document.getElementById("cipherIn").value = "";
      document.getElementById("decryptOut").textContent = "";
    }

    // העתקה
    function copyCipher() {
      const cipherBox = document.getElementById("cipher");
      cipherBox.select();
      document.execCommand("copy");
      alert("הטקסט המוצפן הועתק");
    }
  </script>
</body>
</html>
